name: OpenTofu — Ticket Classifier Pipeline

# Pull request a main  -> tofu plan (sin apply, solo verifica)
# Push a main          -> tofu plan + tofu apply

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Permisos minimos para OIDC (sin access keys, sin secrets).
permissions:
  id-token: write
  contents: read

env:
  TOFU_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"
  # CAMBIA esto: pega el ARN del rol IAM que creaste para GitHub Actions.
  # Debe tener permisos sobre Lambda, Step Functions, S3 e IAM.
  AWS_ROLE: "arn:aws:iam::CUENTA:role/NOMBRE-DEL-ROL"
  # Nombre del bucket S3 (debe coincidir con variable bucket_name).
  TF_VAR_bucket_name: "ticket-classifier-pipeline"

jobs:
  tofu:
    name: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Asume el rol via OIDC.
      # GitHub firma un JWT que AWS verifica contra el OIDC provider
      # configurado en tu cuenta — sin access keys ni secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: tofu fmt
        run: tofu fmt -check -recursive

      - name: tofu init
        run: tofu init

      - name: tofu validate
        run: tofu validate

      - name: tofu plan
        run: tofu plan -no-color -out=tfplan

      # Solo en push a main (no en PRs).
      - name: tofu apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tofu apply -no-color -auto-approve tfplan
